// x = 80 + (year-1940)/90*1160
function x(year){ return Math.round(80 + (year-1940)/90*1160); }

const NODES = [
  // ── KOLLABORATION ──────────────────────────────────────────────
  // row1 y=80, row2 y=106
  [x(1985),  80, 62,26, "#CADCFC","#2E74C0","#0C447C", "QR",
   "Quick Response (1985)",
   "Textil/Retail. POS-Daten fließen direkt an die Produktion. Händler bestellt weiterhin selbst, aber schneller und bedarfsgenauer."],
  [x(1992),  80, 62,26, "#CADCFC","#2E74C0","#0C447C", "ECR",
   "ECR — Efficient Consumer Response (1992)",
   "Handel und Hersteller richten Prozesse gemeinsam am Endkunden aus. Startpunkt der gesamten Kollaborationskette. Erste P&G/Walmart-Kooperation."],
  [x(1995), 106, 62,26, "#B5D4F4","#2E74C0","#0C447C", "CRP",
   "CRP — Continuous Replenishment (1995)",
   "Nachschub aus Verbrauchsdaten, kein expliziter Bestellauftrag. Lieferant liefert zu vereinbarten Intervallen auf Basis von POS-Daten."],
  [x(1998), 106, 62,26, "#B5D4F4","#2E74C0","#0C447C", "VMI",
   "VMI — Vendor Managed Inventory (ca. 1998)",
   "Lieferant bewirtschaftet den Bestand des Kunden eigenständig. Dispositionsentscheidung wandert vollständig zum Hersteller."],
  [x(2000), 106, 62,26, "#B5D4F4","#2E74C0","#0C447C", "CMI",
   "CMI — Co-Managed Inventory (ca. 2000)",
   "Bestand gemeinsam gesteuert, nicht vollständig delegiert. Lieferant macht Vorschlag, Händler gibt frei."],
  [x(1996),  80, 68,26, "#CADCFC","#2E74C0","#0C447C", "CPFR",
   "CPFR — Collaborative Planning, Forecasting & Replenishment (1996)",
   "9-Schritte-Modell: gemeinsame Vereinbarung → Absatzplan → Forecast → Ausnahmen → Bestellprognose → Bestellung."],

  // ── REFERENZMODELLE ────────────────────────────────────────────
  [x(1992), 174, 66,26, "#9FE1CB","#0F6E56","#085041", "APQC",
   "APQC Process Classification Framework (1992)",
   "Branchenübergreifende Prozesstaxonomie für Benchmarking. Mit 80+ Organisationen entwickelt. Vorläufer und Inspiration für SCOR."],
  [x(1996), 162, 66,26, "#5DCAA5","#0F6E56","#085041", "SCOR",
   "SCOR — Supply Chain Operations Reference (1996)",
   "Plan–Source–Make–Deliver–Return–Enable. Prozesse, KPIs, Best Practices. Supply Chain Council (heute ASCM)."],
  [x(2006), 162, 66,26, "#5DCAA5","#0F6E56","#085041", "DCOR",
   "DCOR — Design Chain Operations Reference (2006)",
   "Erweiterung von SCOR für F&E und Produktentwicklung. Entstand weil SCOR diese Prozesse bewusst ausklammerte."],
  [x(2007), 186, 66,26, "#9FE1CB","#0F6E56","#085041", "CCOR",
   "CCOR — Customer Chain Operations Reference (2007)",
   "Kundenseitige Prozesse: Relate–Sell–Quote–Assist. Schließt die Lücke von SCOR auf der Demand-Seite."],
  [x(2010), 162, 66,26, "#5DCAA5","#0F6E56","#085041", "VCOR",
   "VCOR — Value Chain Operations Reference (2009)",
   "Erweitert SCOR auf die gesamte Wertschöpfungskette inkl. Innovation und Marketing."],

  // ── PLANUNG ────────────────────────────────────────────────────
  [x(1984), 248, 66,26, "#FAC775","#BA7517","#633806", "S&OP",
   "S&OP — Sales & Operations Planning (1984)",
   "Dick Ling / Oliver Wight. Monatlicher Prozess: Demand Review → Supply Review → Executive S&OP. Horizont 1–18 Monate. Führungsprozess, kein IT-System."],
  [x(1992), 268, 86,26, "#FAC775","#BA7517","#633806", "Dem. Planning",
   "Demand Planning (1990er)",

  [x(1998), 248, 66,26, "#EF9F27","#BA7517","#633806", "APO",
   "APO — Advanced Planning & Optimization (SAP, 1998)",

  [x(2005), 248, 66,26, "#EF9F27","#BA7517","#633806", "IBP",
   "IBP — Integrated Business Planning (2005)",
   "Oliver Wight. Erweiterung von S&OP um Strategie, Finanzen und Szenarioperspektive. Horizont 24–36 Monate. C-Level statt mittleres Management."],
  [x(2012), 268, 90,26, "#FAC775","#BA7517","#633806", "Dem. Sensing",
   "Demand Sensing (ab 2010)",
   "Kurzfristige Nachfrageerkennung aus Echtzeit-Signalen: POS, Online, Wetter, Social. Horizont 0–8 Wochen. Erst durch KI/ML praktisch nutzbar."],

  // ── AUFTRAGSLOGIK ──────────────────────────────────────────────
  [x(1984), 316, 78,26, "#F09575","#C04828","#4A1B0C", "CODP/OPP",
   "CODP / OPP — Customer Order Decoupling Point (1984/1992)",

  // ── MRP-FAMILIE ────────────────────────────────────────────────
  [x(1964), 460, 62,26, "#AFA9EC","#534AB7","#26215C", "MRP",
   "MRP — Material Requirements Planning (1964)",
   "Orlicky / IBM. Stückliste + Bestand + Termin = Bestellvorschlag. Erste computergestützte Bedarfsplanung. First live system: Black & Decker 1964."],
  [x(1975), 476, 62,26, "#AFA9EC","#534AB7","#26215C", "DRP",
   "DRP — Distribution Requirements Planning (1975)",
   "MRP-Logik auf Distributionsnetzwerke: Zentrallager → Regionallager → Filialen. Selber Algorithmus, andere Domäne."],
  [x(1980), 460, 70,26, "#7F77DD","#534AB7","#26215C", "MRP II",

  [x(1985), 484, 90,26, "#AFA9EC","#534AB7","#26215C", "Fortschrittszahl",
   "Fortschrittszahlen (1980er, Automobilindustrie)",

  [x(2011), 460, 78,26, "#7F77DD","#534AB7","#26215C", "DDMRP",

  [x(1950), 548, 66,26, "#C0DD97","#3B6D11","#173404", "Kanban",

  [x(1985), 560, 86,26, "#C0DD97","#3B6D11","#173404", "Synchro-MRP",
   "Synchro-MRP (ca. 1985)",
   "Kombination aus MRP II und Kanban. MRP für die grobe Planung, Kanban für die operative Steuerung am Shopfloor. Hybridansatz Push/Pull."],
  [x(1990), 548, 70,26, "#97C459","#3B6D11","#173404", "ConWIP",
   "ConWIP — Continuous Work in Progress (1990)",
   "Spearman & Hopp. Konstanter WIP-Bestand im System statt auftragsindividueller Freigabe. Einfacher als Kanban, robuster bei Varianz."],
  [x(1994), 560, 62,26, "#C0DD97","#3B6D11","#173404", "BOA",
   "BOA — Belastungsorientierte Auftragsfreigabe / Trichtermodell (1990er)",
   "Wiendahl. Trichtermodell für Auftragsbestand. Kennlinien für Durchlaufzeit, Bestand und Auslastung. Logistikkennlinien als Steuerungsinstrument."],

  // ── POSTPONEMENT ──────────────────────────────────────────────
  [x(1950), 618,100,26, "#F4C0D1","#993556","#4B1528", "Postponement",
   "Postponement (ab 1950)",
   "Wroe Alderson 1950. Variantenbildung so spät wie möglich. Zinn & Bowersox 1988 formalisiert. Bestand generisch halten, erst bei besserer Nachfrageinformation differenzieren."],
  [x(1987), 618, 90,26, "#ED93B1","#993556","#4B1528", "Mass Custom.",

   "Stan Davis 1987: 'Future Perfect'. Pine 1993 operationalisiert. Kundenindividuelle Produkte mit industrieller Effizienz — nur durch Modularisierung möglich."],
  [x(1992), 632, 96,26, "#F4C0D1","#993556","#4B1528", "Modularisierung",
   "Modularisierung (1990er)",
   "Produktarchitektur in standardisierte Bausteine. Plattformstrategie (z.B. VW MQB). Technisches Fundament für Postponement und Mass Customization."],

  // row1 y=678, row2 y=704
  [x(1943), 678, 72,26, "#D3D1C7","#5F5E5A","#2C2C2A", "RFID (IFF)",

  [x(1952), 704, 68,26, "#D3D1C7","#5F5E5A","#2C2C2A", "Barcode",

   "EDI — Electronic Data Interchange (1960er/70er)",
   "Elektronischer Datenaustausch zwischen Unternehmenssystemen. Technologische Grundvoraussetzung für alle kollaborativen Konzepte (VMI, ECR, CPFR)."],
  [x(1980), 704, 76,26, "#D3D1C7","#5F5E5A","#2C2C2A", "POS-Daten",
   "POS-Daten / Scanning (1980er)",
   "Point-of-Sale Erfassung in Echtzeit. Ohne POS-Daten sind QR, ECR, VMI und Demand Sensing konzeptionell möglich, aber praktisch wirkungslos."],
  [x(1992), 678, 58,26, "#D3D1C7","#5F5E5A","#2C2C2A", "ERP",

const tt  = document.getElementById("tt");

NODES.forEach(([cx,cy,w,h,fill,stroke,textColor,label,tipTitle,tipText]) => {
  const g = document.createElementNS(NS,"g");
  g.setAttribute("class","node");

  const r = document.createElementNS(NS,"rect");
  r.setAttribute("x", cx - w/2); r.setAttribute("y", cy - h/2);
  r.setAttribute("width", w);    r.setAttribute("height", h);
  r.setAttribute("rx","7");
  r.setAttribute("fill", fill);
  r.setAttribute("stroke", stroke);
  r.setAttribute("stroke-width","1.2");
  g.appendChild(r);

  const t = document.createElementNS(NS,"text");
  t.setAttribute("x", cx); t.setAttribute("y", cy);
  t.setAttribute("text-anchor","middle");
  t.setAttribute("dominant-baseline","central");
  t.setAttribute("fill", textColor);
  t.setAttribute("font-size", label.length > 11 ? "9.5" : "11");
  t.setAttribute("font-weight","600");
  t.setAttribute("font-family","-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif");
  t.setAttribute("pointer-events","none");
  t.textContent = label;
  g.appendChild(t);

  g.addEventListener("mouseenter", () => {
    tt.innerHTML = `<strong>${tipTitle}</strong>${tipText}`;
    tt.classList.add("show");
  });
  g.addEventListener("mousemove", e => {
    let lx = e.clientX + 14, ly = e.clientY - 10;
    if (lx + 260 > window.innerWidth) lx = e.clientX - 268;
    tt.style.left = lx+"px"; tt.style.top = ly+"px";
  });
  g.addEventListener("mouseleave", () => tt.classList.remove("show"));
  svg.appendChild(g);
});
</script>
</body>
</html>
